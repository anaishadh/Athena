global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: athena
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics
    scrape_interval: 15s